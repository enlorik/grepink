name: grepink
description: Personal knowledge management app and AI-powered memory extension.
publish_to: 'none'
version: 2.1.0+1

environment:
  # Ranges used for cross-platform compatibility; use pubspec.lock for reproducible builds.
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  http: ^1.2.1
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.0.0
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
