name: grepink
description: Personal knowledge management app and AI-powered memory extension.
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  http: ^1.2.1
  shared_preferences: ^2.3.1
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  path: ^1.9.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
